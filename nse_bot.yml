name: NSE Announcement Bot

on:
  schedule:
    # Runs every 2 hours (UTC). NSE trading hours are ~3:30 AM – 10:00 AM UTC.
    # Adjust cron below if you want to restrict to market hours only.
    - cron: "0 */2 * * *"
  workflow_dispatch:   # allow manual trigger from GitHub Actions UI

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      # ── 1. Checkout repo ────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      # ── 3. Install dependencies ──────────────────────────────────────────────
      - name: Install dependencies
        run: pip install -r requirements.txt

      # ── 4. Restore seen_ids cache ────────────────────────────────────────────
      # This keeps seen_ids.json persistent across workflow runs
      - name: Restore seen_ids cache
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      # ── 5. Run the scraper ───────────────────────────────────────────────────
      - name: Run NSE scraper
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_JSON:   ${{ secrets.GOOGLE_CREDS_JSON }}
          SHEET_TAB_NAME:      ${{ vars.SHEET_TAB_NAME }}
        run: python nse_scraper.py

      # ── 6. Save updated seen_ids ─────────────────────────────────────────────
      - name: Save seen_ids cache
        uses: actions/cache@v4
        if: always()
        with:
          path: seen_ids.json
          key: seen-ids-${{ github.run_id }}
