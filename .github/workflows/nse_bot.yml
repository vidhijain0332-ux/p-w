name: NSE Announcement Bot

on:
  schedule:
    - cron: "0 */2 * * *"
  workflow_dispatch:

jobs:
  run-bot:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: "pip"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Restore seen_ids cache
        uses: actions/cache@v4
        with:
          path: seen_ids.json
          key: seen-ids-${{ github.run_id }}
          restore-keys: |
            seen-ids-

      - name: Write Google credentials to file
        run: echo '${{ secrets.GOOGLE_CREDS_JSON }}' > /tmp/gcreds.json

      - name: Run NSE scraper
        env:
          TELEGRAM_TOKEN:      ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHANNEL_ID: ${{ secrets.TELEGRAM_CHANNEL_ID }}
          GOOGLE_SHEET_ID:     ${{ secrets.GOOGLE_SHEET_ID }}
          GOOGLE_CREDS_PATH:   /tmp/gcreds.json
          SHEET_TAB_NAME:      ${{ vars.SHEET_TAB_NAME }}
        run: python nse_scraper.py

      - name: Save seen_ids cache
        uses: actions/cache@v4
        if: always()
        with:
          path: seen_ids.json
          key: seen-ids-${{ github.run_id }}
